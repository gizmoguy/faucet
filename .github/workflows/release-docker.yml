name: Build docker images for release

on:
  push:
    tags:
      - "[0-9]+.[0-9]+.[0-9]+"
  pull_request:

jobs:
  faucet-docker-image:
    name: "Build faucet docker image"
    runs-on: ubuntu-latest
    environment:
      name: "release"
    steps:
      - name: Checkout repo
        uses: actions/checkout@v6
      - name: Set up qemu
        uses: docker/setup-qemu-action@v3
        with:
          platforms: all
      - name: Set up docker buildx
        id: buildx
        uses: docker/setup-buildx-action@v3
        with:
          version: latest
      - name: Run buildx
        run: |
          docker buildx build \
            --tag "faucet/faucet:test" \
            --tag faucet/faucet:latest \
            --platform linux/386,linux/amd64,linux/arm/v6,linux/arm/v7,linux/arm64/v8,linux/ppc64le,linux/s390x \
            --file Dockerfile.faucet \
            .

  gauge-docker-image:
    name: "Build gauge docker image"
    runs-on: ubuntu-latest
    environment:
      name: "release"
    needs: faucet-docker-image
    steps:
      - name: Checkout repo
        uses: actions/checkout@v6
      - name: Set up qemu
        uses: docker/setup-qemu-action@v3
        with:
          platforms: all
      - name: Set up docker buildx
        id: buildx
        uses: docker/setup-buildx-action@v3
        with:
          version: latest
      - name: Run buildx
        run: |
          docker buildx build \
            --tag "faucet/gauge:test" \
            --tag faucet/gauge:latest \
            --platform linux/386,linux/amd64,linux/arm/v6,linux/arm/v7,linux/arm64/v8,linux/ppc64le,linux/s390x \
            --file Dockerfile.gauge \
            .

  rabbitmq-adapter-docker-image:
    name: "Build rabbitmq adapter docker image"
    runs-on: ubuntu-latest
    environment:
      name: "release"
    steps:
      - name: Checkout repo
        uses: actions/checkout@v6
      - name: Set up qemu
        uses: docker/setup-qemu-action@v3
        with:
          platforms: all
      - name: Set up docker buildx
        id: buildx
        uses: docker/setup-buildx-action@v3
        with:
          version: latest
      - name: Run buildx
        run: |
          cd adapters/vendors/rabbitmq/
          docker buildx build \
            --tag "faucet/event-adapter-rabbitmq:test" \
            --tag faucet/event-adapter-rabbitmq:latest \
            --platform linux/386,linux/amd64,linux/arm/v6,linux/arm/v7,linux/arm64/v8,linux/ppc64le,linux/s390x \
            --file Dockerfile \
            .

  faucetagent-adapter-docker-image:
    name: "Build faucetagent adapter docker image"
    runs-on: ubuntu-latest
    environment:
      name: "release"
    steps:
      - name: Checkout repo
        uses: actions/checkout@v6
      - name: Set up qemu
        uses: docker/setup-qemu-action@v3
        with:
          platforms: all
      - name: Set up docker buildx
        id: buildx
        uses: docker/setup-buildx-action@v3
        with:
          version: latest
      - name: Run buildx
        run: |
          cd adapters/vendors/faucetagent/
          docker buildx build \
            --tag "faucet/event-adapter-faucetagent:test" \
            --tag faucet/event-adapter-faucetagent:latest \
            --platform linux/amd64 \
            --file Dockerfile \
            .
